# AI Daily Report Configuration
# Copy this file to config.yaml and fill in your values

sources:
  hackernews:
    enabled: true
    # Keywords to filter AI-related stories
    keywords:
      - AI
      - ML
      - GPT
      - LLM
      - "machine learning"
      - "deep learning"
      - "neural network"
      - "artificial intelligence"
    max_posts: 20

  reddit:
    enabled: false
    # Reddit blocks server-side API requests
    # JSON API returns "Blocked" for non-browser requests
    # Alternative: Use other free sources (HackerNews + GitHub + RSS feeds)
    subreddits:
      - LocalLLaMA
      - MachineLearning
      - artificial
    limit: 25
    max_posts: 50

  github:
    enabled: true
    # Languages to filter
    languages:
      - Python
      - "Jupyter Notebook"
    # Keywords in repository names/descriptions
    keywords:
      - AI
      - machine-learning
      - deep-learning
      - neural-network
      - NLP
      - GPT
    max_repos: 15

  twitter:
    enabled: false
    # Nitter instances are frequently blocked by Twitter
    # Alternative: Use other free sources (HackerNews, GitHub, Reddit)
    # Or consider paid Twitter API ($100/month for Basic tier)
    accounts:
      - OpenAI
      - AnthropicAI
      - GoogleAI
      - DeepMindAI
    max_tweets: 20

github:
  # Your GitHub repository URL (SSH)
  repo_url: git@github.com:gongeek/ai-daily-reports.git
  branch: main
  commit_message: "Add AI daily report for {date}"

report:
  output_dir: reports
  date_format: "%Y-%m-%d"
  include_summary: true

logging:
  level: INFO
  file: logs/daily_report.log
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

notification:
  enabled: false
  # Optional: email or webhook for failure alerts
  email:
    smtp_server: smtp.gmail.com
    smtp_port: 587
    sender: your_email@gmail.com
    password: YOUR_EMAIL_PASSWORD
    receiver: your_email@gmail.com