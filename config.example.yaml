# AI Daily Report Configuration
# Copy this file to config.yaml and fill in your values

sources:
  hackernews:
    enabled: true
    # Keywords to filter AI-related stories
    keywords:
      - AI
      - ML
      - GPT
      - LLM
      - "machine learning"
      - "deep learning"
      - "neural network"
      - "artificial intelligence"
    max_posts: 20

  reddit:
    enabled: true
    subreddits:
      - MachineLearning
      - artificial
      - ArtificialIntelligence
      - deeplearning
    # Get these from https://www.reddit.com/prefs/apps
    client_id: YOUR_REDDIT_CLIENT_ID
    client_secret: YOUR_REDDIT_CLIENT_SECRET
    user_agent: "AI Daily Report Bot 1.0"
    max_posts: 15

  github:
    enabled: true
    # Languages to filter
    languages:
      - Python
      - "Jupyter Notebook"
    # Keywords in repository names/descriptions
    keywords:
      - AI
      - machine-learning
      - deep-learning
      - neural-network
      - NLP
      - GPT
    max_repos: 15

  rss:
    enabled: true
    max_articles: 40
    feeds:
      - https://openai.com/blog/rss.xml
      - https://deepmind.google/research/rss.xml
      - https://www.anthropic.com/rss
      - https://blog.google/technology/ai/rss
      - https://distill.pub/rss.xml
      - https://ai.googleblog.com/atom.xml
      - https://www.importai.com/rss
      - https://lastweekin.ai/rss
      - https://artificialintelligence-news.com/feed
      - https://www.technologyreview.com/feed/
      - https://www.wired.com/feed/rss

  arxiv:
    enabled: true
    categories:
      - cs.AI
      - cs.CL
      - cs.LG
      - cs.CV
      - stat.ML
    max_results: 50
    max_posts: 20
    timeout: 12
    keywords:
      - language model
      - LLM
      - agent
      - GPT
      - transformer
      - machine learning
      - deep learning
      - multimodal
      - retrieval
      - computer vision

  huggingface:
    enabled: true
    max_papers: 20

  twitter:
    enabled: false
    # Preferred: official X API bearer token. You can also set X_BEARER_TOKEN in the environment.
    bearer_token: YOUR_X_BEARER_TOKEN
    # Legacy fallback: RapidAPI key for Twitter data
    rapidapi_key: YOUR_RAPIDAPI_KEY
    max_tweets: 20
    search_terms:
      - AI
      - LLM
      - GPT
      - machine learning

github:
  # Your GitHub repository URL (SSH)
  repo_url: git@github.com:YOUR_USERNAME/ai-daily-reports.git
  branch: main
  commit_message: "Add AI daily report for {date}"

report:
  output_dir: reports
  date_format: "%Y-%m-%d"
  include_summary: true

logging:
  level: INFO
  file: logs/daily_report.log
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

notification:
  enabled: false
  # Optional: email or webhook for failure alerts
  email:
    smtp_server: smtp.gmail.com
    smtp_port: 587
    sender: your_email@gmail.com
    password: YOUR_EMAIL_PASSWORD
    receiver: your_email@gmail.com
